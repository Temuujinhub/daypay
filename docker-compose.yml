services:
  postgres:
    image: postgres:15-alpine
    container_name: daypay-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: daypay
      POSTGRES_PASSWORD: daypay
      POSTGRES_DB: daypay
    ports:
      - "5432:5432"
    volumes:
      - daypay_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U daypay"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: daypay-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - daypay_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  daypay_pgdata:
  daypay_redisdata:
